<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mau Mabar Dengan Didi Rani?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#ffb6d9;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    z-index:10;
}

h1{
    color:white;
    text-shadow:2px 2px 5px rgba(0,0,0,.3);
    margin-bottom:30px;
    font-size:2rem;
}

button{
    border:none;
    cursor:pointer;
    padding:15px 25px;
    font-size:18px;
    border-radius:15px;
    margin:10px;
    transition:0.3s;
}

#mauBtn{
    background:#ff1493;
    color:white;
}

#mauBtn:hover{
    transform:scale(1.1);
}

#ogahBtn{
    background:black;
    color:white;
    position:absolute;
}

#linkArea{
    margin-top:25px;
}

#linkBtn{
    display:none;
    text-decoration:none;
    background:#ff8fcf;
    color:white;
    padding:15px 25px;
    border-radius:15px;
    font-size:18px;
    font-weight:bold;
}

.credit{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    color:white;
    font-weight:bold;
    text-shadow:1px 1px 3px black;
}

.emoji{
    position:fixed;
    top:-50px;
    font-size:30px;
    animation:fall linear infinite;
    pointer-events:none;
}

@keyframes fall{
    from{
        transform:translateY(-50px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>🥰 Mau Mabar Dengan Didi Rani? 🥰</h1>

    <button id="mauBtn">🥰 Mau Banget</button>
    <button id="ogahBtn">🗿 Ogah</button>

    <div id="linkArea">
        <a id="linkBtn"
           href="https://www.roblox.com/share?code=12a4eb1f6b9de54b9eb6ad7471ac1eda&type=Server"
           target="_blank">
           💖 Join Roblox Server 💖
        </a>
    </div>
</div>

<div class="credit">
    creat by m_didi
</div>

<script>
const ogahBtn = document.getElementById("ogahBtn");
const mauBtn = document.getElementById("mauBtn");
const linkBtn = document.getElementById("linkBtn");

// Posisi awal tombol ogah
ogahBtn.style.left = "60%";
ogahBtn.style.top = "55%";

// Tombol ogah kabur
function moveButton(){
    const maxX = window.innerWidth - ogahBtn.offsetWidth;
    const maxY = window.innerHeight - ogahBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    ogahBtn.style.left = x + "px";
    ogahBtn.style.top = y + "px";
}

ogahBtn.addEventListener("mouseover", moveButton);
ogahBtn.addEventListener("touchstart", moveButton);

// Tombol mau banget
mauBtn.addEventListener("click", () => {
    document.querySelector("h1").innerHTML =
        "🥰 Yeay! Didi Rani siap mabar! 🥰";

    linkBtn.style.display = "inline-block";
});

// Emoji berterbangan
const emojis = [
"😂","🤔","🙏🏻","🙄","😠","🗿","🥰","🗿","😱","🫵🏻",
"😎","🙄","😱","🤔","🤭","🤏🏻","🫸🏻","😠","🥲","😋",
"💔","🥰","🫸🏻","🤏🏻"
];

function createEmoji(){
    const emoji = document.createElement("div");
    emoji.classList.add("emoji");

    emoji.innerHTML =
        emojis[Math.floor(Math.random()*emojis.length)];

    emoji.style.left = Math.random()*100 + "vw";
    emoji.style.animationDuration =
        (4 + Math.random()*6) + "s";

    document.body.appendChild(emoji);

    setTimeout(()=>{
        emoji.remove();
    },10000);
}

setInterval(createEmoji, 250);
</script>

</body>
</html>
